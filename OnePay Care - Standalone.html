  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ary-green-press: #007940;\n\n  /* ── Brand · Maya Purple (secondary) ────────────────── */\n  --purple-950: #1F155F;   /* deepest brand purple */\n  --purple-900: #2C1C5F;\n  --purple-700: #5236C9;\n  --purple-500: #6155F5;   /* indigo accent */\n  --purple-300: #93AAFC;\n  --purple-100: #CBAFFF;\n  --maya-purple: var(--purple-700);\n\n  /* ── Neutrals · Gray ramp (light mode) ──────────────── */\n  --gray-25:  #FDFDFD;\n  --gray-50:  #FAFAFA;\n  --gray-100: #F5F5F5;\n  --gray-200: #E9EAEB;\n  --gray-300: #D5D7DA;\n  --gray-400: #A4A7AE;\n  --gray-500: #717680;\n  --gray-600: #535862;\n  --gray-700: #414651;\n  --gray-800: #252B37;\n  --gray-900: #181D27;\n  --gray-950: #0A0D12;\n\n  /* ── Surfaces · Merchant dark (terminal/POS) ────────── */\n  --black:       #000000;\n  --ink-900:     #0A0A0A;   /* POS canvas */\n  --ink-800:     #141414;\n  --ink-700:     #1C1C1C;\n  --ink-600:     #202426;\n  --white:       #FFFFFF;\n\n  /* ── Semantic · Status ──────────────────────────────── */\n  --success-50:  #ECFDF3;\n  --success-100: #DCFAE6;\n  --success-500: #17B26A;\n  --success-600: #079455;\n  --error-50:    #FEF3F2;\n  --error-100:   #FEE4E2;\n  --error-500:   #F04438;\n  --error-600:   #D92D20;\n  --warning-50:  #FFFAEB;\n  --warning-100: #FEF0C7;\n  --warning-500: #F79009;\n  --warning-600: #DC6803;\n  --info-500:    #007AFF;\n\n  /* ── Accent · Soft brand accents (cards, badges, charts) ─ */\n  --accent-blue:     #A1DEFF;\n  --accent-cyan:     #94EEF0;\n  --accent-teal:     #5FE9D0;\n  --accent-grass:    #75EA9A;\n  --accent-spring:   #C4EB9B;\n  --accent-yellow:   #FFC043;\n  --accent-orange:   #FFB37E;\n  --accent-red:      #FFB8B2;\n  --accent-pink:     #FFB6D8;\n  --accent-purple:   #CBAFFF;\n  --accent-lavender: #AFB7FF;\n\n  /* ── Semantic aliases · light surface ───────────────── */\n  --bg-app:         var(--gray-50);\n  --bg-surface:     var(--white);\n  --bg-subtle:      var(--gray-100);\n  --bg-accent:      var(--primary-green);\n  --bg-inverse:     var(--ink-900);\n\n  --text-primary:   var(--gray-900);\n  --text-secondary: var(--gray-700);\n  --text-tertiary:  var(--gray-500);\n  --text-disabled:  var(--gray-400);\n  --text-on-accent: var(--white);\n  --text-link:      var(--primary-green);\n  --text-inverse:   var(--white);\n\n  --border-subtle:  var(--gray-200);\n  --border-default: var(--gray-300);\n  --border-strong:  var(--gray-400);\n  --border-focus:   var(--primary-green);\n\n  /* ── Semantic aliases · merchant dark surface ───────── */\n  --on-dark-text-primary:   var(--white);\n  --on-dark-text-secondary: rgba(255,255,255,0.64);\n  --on-dark-text-tertiary:  rgba(255,255,255,0.40);\n  --on-dark-surface:        var(--ink-700);\n  --on-dark-border:         rgba(255,255,255,0.10);\n  --on-dark-accent:         var(--green-300);\n}\n<\u002Fstyle>\n<style>/* ── Maya Business · Typography Tokens ─────────────────────────────\n   Brand families: Cerebri Sans Pro (UI/body) + Jeko (display).\n   Substituted with Hanken Grotesk + Poppins (see tokens/fonts.css).\n   Roboto = genuine on-device terminal typeface. */\n\n:root {\n  /* families */\n  --font-sans:    'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;\n  --font-display: 'Poppins', 'Hanken Grotesk', sans-serif;\n  --font-device:  'Roboto', system-ui, sans-serif;  /* POS / Android terminal screens */\n\n  /* weights (Cerebri parlance: Book 400 · Regular 400 · Medium 500 · SemiBold 600 · Bold 700 · Heavy 800) */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-heavy:    800; /* @kind font */\n\n  /* type scale (px) — anchored to the file's recurring sizes */\n  --fs-display-xl: 56px;\n  --fs-display-lg: 48px;\n  --fs-display-md: 40px;\n  --fs-display-sm: 32px;   /* big amount / page hero */\n  --fs-heading:    24px;\n  --fs-title:      20px;\n  --fs-subtitle:   18px;\n  --fs-body-lg:    16px;\n  --fs-body:       14px;   /* default UI text */\n  --fs-caption:    12px;\n  --fs-micro:      11px;\n\n  /* line heights */\n  --lh-tight:   1.12;   /* @kind other */\n  --lh-snug:    1.25;   /* @kind other */\n  --lh-normal:  1.4;    /* @kind other */\n  --lh-relaxed: 1.5;    /* @kind other */\n\n  /* tracking */\n  --ls-display: -0.02em;   /* @kind other */\n  --ls-tight:   -0.01em;   /* @kind other */\n  --ls-normal:  0em;       /* @kind other */\n  --ls-caps:    0.04em;    /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ── Maya Business · Spacing & Radius Tokens ───────────────────────\n   4-pt base grid extracted from the file's spacing variables. */\n\n:root {\n  /* spacing scale */\n  --space-0:   0;\n  --space-1:   2px;\n  --space-2:   4px;\n  --space-3:   6px;\n  --space-4:   8px;\n  --space-5:   12px;\n  --space-6:   16px;\n  --space-7:   20px;\n  --space-8:   24px;\n  --space-9:   32px;\n  --space-10:  40px;\n  --space-11:  48px;\n  --space-12:  64px;\n  --space-13:  96px;\n  --space-14:  128px;\n\n  /* radii — from radius-* variables (xxs 2 · sm 6 · md 8 · lg 12 · xl 16) */\n  --radius-xs:   2px;\n  --radius-sm:   6px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-2xl:  20px;\n  --radius-3xl:  24px;\n  --radius-card: 16px;   /* default card corner */\n  --radius-full: 9999px;\n\n  /* layout */\n  --container-mobile: 390px;   /* @kind spacing */\n  --tap-target:       44px;    /* @kind spacing */\n}\n<\u002Fstyle>\n<style>/* ── Maya Business · Elevation & Effect Tokens ─────────────────────\n   Shadow ramp built from the file's rgba(0,0,0,·) shadow stack. */\n\n:root {\n  /* light-surface elevation */\n  --shadow-xs:  0 1px 2px rgba(10,13,18,0.05);\n  --shadow-sm:  0 1px 3px rgba(10,13,18,0.10), 0 1px 2px rgba(10,13,18,0.06);\n  --shadow-md:  0 4px 8px -2px rgba(10,13,18,0.10), 0 2px 4px -2px rgba(10,13,18,0.06);\n  --shadow-lg:  0 12px 16px -4px rgba(10,13,18,0.08), 0 4px 6px -2px rgba(10,13,18,0.03);\n  --shadow-xl:  0 20px 24px -4px rgba(10,13,18,0.08), 0 8px 8px -4px rgba(10,13,18,0.03);\n\n  /* card on white — soft, low-contrast Maya lift */\n  --shadow-card: 0 2px 8px rgba(10,13,18,0.06), 0 0 1px rgba(10,13,18,0.10);\n\n  /* green glow — used on primary CTAs / live terminal states */\n  --glow-green: 0 8px 24px rgba(43,219,143,0.35);\n\n  /* focus ring */\n  --ring-focus: 0 0 0 4px rgba(3,190,100,0.20);\n\n  /* blur — frosted overlays / status bars */\n  --blur-overlay: blur(20px); /* @kind other */\n\n  /* motion */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-emphasis: cubic-bezier(0.3, 0, 0, 1); /* @kind other */\n  --dur-fast:  120ms; /* @kind other */\n  --dur-base:  200ms; /* @kind other */\n  --dur-slow:  320ms; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ── Maya Business · Base element styles ───────────────────────────\n   Lightweight resets + default typography mapped to tokens.\n   Scoped utility classes the components and cards rely on. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--text-primary);\n  background: var(--bg-app);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* type helpers */\n.maya-display { font-family: var(--font-display); font-weight: var(--fw-bold); line-height: var(--lh-tight); letter-spacing: var(--ls-display); }\n.maya-amount  { font-family: var(--font-sans); font-weight: var(--fw-bold); letter-spacing: var(--ls-tight); font-variant-numeric: tabular-nums; }\n.maya-eyebrow { font-size: var(--fs-caption); font-weight: var(--fw-semibold); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-tertiary); }\n\na { color: var(--text-link); text-decoration: none; }\n<\u002Fstyle>\n<style>/* ════════════════════════════════════════════════════════════════\n   Maya Business · Design System\n   Glob :  var(--gray-400);\n  --text-on-accent: var(--white);\n  --text-link:      var(--primary-green);\n  --text-inverse:   var(--white);\n\n  --border-subtle:  var(--gray-200);\n  --border-default: var(--gray-300);\n  --border-strong:  var(--gray-400);\n  --border-focus:   var(--primary-green);\n\n  /* ── Semantic aliases · merchant dark surface ───────── */\n  --on-dark-text-primary:   var(--white);\n  --on-dark-text-secondary: rgba(255,255,255,0.64);\n  --on-dark-text-tertiary:  rgba(255,255,255,0.40);\n  --on-dark-surface:        var(--ink-700);\n  --on-dark-border:         rgba(255,255,255,0.10);\n  --on-dark-accent:         var(--green-300);\n}\n\n/* ── Maya Business · Typography Tokens ─────────────────────────────\n   Brand families: Cerebri Sans Pro (UI/body) + Jeko (display).\n   Substituted with Hanken Grotesk + Poppins (see tokens/fonts.css).\n   Roboto = genuine on-device terminal typeface. */\n\n:root {\n  /* families */\n  --font-sans:    'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;\n  --font-display: 'Poppins', 'Hanken Grotesk', sans-serif;\n  --font-device:  'Roboto', system-ui, sans-serif;  /* POS / Android terminal screens */\n\n  /* weights (Cerebri parlance: Book 400 · Regular 400 · Medium 500 · SemiBold 600 · Bold 700 · Heavy 800) */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-heavy:    800; /* @kind font */\n\n  /* type scale (px) — anchored to the file's recurring sizes */\n  --fs-display-xl: 56px;\n  --fs-display-lg: 48px;\n  --fs-display-md: 40px;\n  --fs-display-sm: 32px;   /* big amount / page hero */\n  --fs-heading:    24px;\n  --fs-title:      20px;\n  --fs-subtitle:   18px;\n  --fs-body-lg:    16px;\n  --fs-body:       14px;   /* default UI text */\n  --fs-caption:    12px;\n  --fs-micro:      11px;\n\n  /* line heights */\n  --lh-tight:   1.12;   /* @kind other */\n  --lh-snug:    1.25;   /* @kind other */\n  --lh-normal:  1.4;    /* @kind other */\n  --lh-relaxed: 1.5;    /* @kind other */\n\n  /* tracking */\n  --ls-display: -0.02em;   /* @kind other */\n  --ls-tight:   -0.01em;   /* @kind other */\n  --ls-normal:  0em;       /* @kind other */\n  --ls-caps:    0.04em;    /* @kind other */\n}\n\n/* ── Maya Business · Spacing & Radius Tokens ───────────────────────\n   4-pt base grid extracted from the file's spacing variables. */\n\n:root {\n  /* spacing scale */\n  --space-0:   0;\n  --space-1:   2px;\n  --space-2:   4px;\n  --space-3:   6px;\n  --space-4:   8px;\n  --space-5:   12px;\n  --space-6:   16px;\n  --space-7:   20px;\n  --space-8:   24px;\n  --space-9:   32px;\n  --space-10:  40px;\n  --space-11:  48px;\n  --space-12:  64px;\n  --space-13:  96px;\n  --space-14:  128px;\n\n  /* radii — from radius-* variables (xxs 2 · sm 6 · md 8 · lg 12 · xl 16) */\n  --radius-xs:   2px;\n  --radius-sm:   6px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-2xl:  20px;\n  --radius-3xl:  24px;\n  --radius-card: 16px;   /* default card corner */\n  --radius-full: 9999px;\n\n  /* layout */\n  --container-mobile: 390px;   /* @kind spacing */\n  --tap-target:       44px;    /* @kind spacing */\n}\n\n/* ── Maya Business · Elevation & Effect Tokens ─────────────────────\n   Shadow ramp built from the file's rgba(0,0,0,·) shadow stack. */\n\n:root {\n  /* light-surface elevation */\n  --shadow-xs:  0 1px 2px rgba(10,13,18,0.05);\n  --shadow-sm:  0 1px 3px rgba(10,13,18,0.10), 0 1px 2px rgba(10,13,18,0.06);\n  --shadow-md:  0 4px 8px -2px rgba(10,13,18,0.10), 0 2px 4px -2px rgba(10,13,18,0.06);\n  --shadow-lg:  0 12px 16px -4px rgba(10,13,18,0.08), 0 4px 6px -2px rgba(10,13,18,0.03);\n  --shadow-xl:  0 20px 24px -4px rgba(10,13,18,0.08), 0 8px 8px -4px rgba(10,13,18,0.03);\n\n  /* card on white — soft, low-contrast Maya lift */\n  --shadow-card: 0 2px 8px rgba(10,13,18,0.06), 0 0 1px rgba(10,13,18,0.10);\n\n  /* green glow — used on primary CTAs / live terminal states */\n  --glow-green: 0 8px 24px rgba(43,219,143,0.35);\n\n  /* focus ring */\n  --ring-focus: 0 0 0 4px rgba(3,190,100,0.20);\n\n  /* blur — frosted overlays / status bars */\n  --blur-overlay: blur(20px); /* @kind other */\n\n  /* motion */\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-emphasis: cubic-bezier(0.3, 0, 0, 1); /* @kind other */\n  --dur-fast:  120ms; /* @kind other */\n  --dur-base:  200ms; /* @kind other */\n  --dur-slow:  320ms; /* @kind other */\n}\n\n/* ── Maya Business · Base element styles ───────────────────────────\n   Lightweight resets + default typography mapped to tokens.\n   Scoped utility classes the components and cards rely on. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-normal);\n  color: var(--text-primary);\n  background: var(--bg-app);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* type helpers */\n.maya-display { font-family: var(--font-display); font-weight: var(--fw-bold); line-height: var(--lh-tight); letter-spacing: var(--ls-display); }\n.maya-amount  { font-family: var(--font-sans); font-weight: var(--fw-bold); letter-spacing: var(--ls-tight); font-variant-numeric: tabular-nums; }\n.maya-eyebrow { font-size: var(--fs-caption); font-weight: var(--fw-semibold); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-tertiary); }\n\na { color: var(--text-link); text-decoration: none; }\n\n<\u002Fstyle>\n<script src=\"a1f4df62-d3bd-4dcf-ae7b-0787db81c915\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  @keyframes opc-spin { to { transform: rotate(360deg); } }\n  @keyframes opc-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(3,190,100,0.45); } 50% { box-shadow: 0 0 0 8px rgba(3,190,100,0); } }\n  @keyframes opc-rise { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }\n  @keyframes opc-toast { from { transform: translate(-50%,16px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }\n  .opc-scroll::-webkit-scrollbar { width: 0; height: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:28px 20px; background:radial-gradient(120% 120% at 50% 0%, #f3f5f7 0%, #e4e7ea 55%, #dadde1 100%); font-family:var(--font-sans);\">\n\n  <!-- caption strip -->\n  <div style=\"width:418px; max-width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; min-height:34px;\">\n    <sc-if value=\"{{ caption }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1; min-width:0; display:inline-flex; align-items:center; gap:9px; padding:8px 14px; background:var(--gray-900); color:#fff; border-radius:var(--radius-full); box-shadow:var(--shadow-md); font-size:13px; font-weight:600; letter-spacing:-0.01em;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:var(--brand-green); flex:none;\"><\u002Fspan>\n        <span style=\"white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ captionText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"flex:none; display:inline-flex; align-items:center; gap:7px; color:var(--gray-500); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;\">\n      <span>Caption<\u002Fspan>\n      <x-import component-from-global-scope=\"MayaBusinessDesignSystem_2ecb7a.Switch\" checked=\"{{ caption }}\" onchange=\"{{ toggleCaption }}\" hint-size=\"48px,28px\"><\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- device -->\n  <div style=\"flex:none; background:linear-gradient(160deg,#15181d,#080a0d); border-radius:48px; padding:15px 15px 19px; box-sha
